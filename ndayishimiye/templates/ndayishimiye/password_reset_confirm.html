{% extends 'ndayishimiye/base.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<h2>Set New Password</h2>
{% if validlink %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Set New Password</button>
</form>
{% else %}
<p>This link is invalid or has expired.</p>
<a href="{% url 'ndayishimiye:password_reset' %}">Request New Link</a>
{% endif %}
{% endblock %}
